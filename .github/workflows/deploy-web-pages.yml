name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'packages/contracts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web-pages.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=apps/web --include-workspace-root

      - name: Test
        working-directory: apps/web
        run: npm test

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
        run: npm run build

      - name: Wait for matching API deployment
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}" | grep -Eq \
            '^(apps/api/|packages/contracts/|package\.json$|package-lock\.json$|server/deploy\.sh$|\.github/workflows/deploy-api\.yml$)'; then
            echo "This push does not trigger an API deployment."
            exit 0
          fi

          api_run_id=""
          for attempt in $(seq 1 240); do
            if [ -z "${api_run_id}" ]; then
              api_run_id="$(
                gh api --method GET \
                  "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-api.yml/runs" \
                  -f head_sha="${GITHUB_SHA}" \
                  -f event=push \
                  -f per_page=10 \
                  --jq '.workflow_runs[0].id // empty'
              )"
            fi

            if [ -z "${api_run_id}" ]; then
              if (( attempt % 6 == 1 )); then
                echo "Waiting for the matching API workflow run to appear..."
              fi
              sleep 10
              continue
            fi

            api_state="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${api_run_id}" \
                --jq '[.status, (.conclusion // ""), .html_url] | @tsv'
            )"
            IFS=$'\t' read -r status conclusion run_url <<< "${api_state}"

            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" = "success" ]; then
                echo "API deployment succeeded: ${run_url}"
                exit 0
              fi

              echo "API deployment ended with ${conclusion}: ${run_url}"
              exit 1
            fi

            if (( attempt % 6 == 1 )); then
              echo "API deployment is ${status}: ${run_url}"
            fi
            sleep 10
          done

          echo "Timed out waiting for API deployment run ${api_run_id:-unknown}."
          exit 1

      - name: Deploy to pcugame.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: pcugame/pcugame.github.io
          publish_branch: master
          publish_dir: apps/web/dist
          user_name: bipolarrr
          user_email: challengedbipolar@gmail.com
