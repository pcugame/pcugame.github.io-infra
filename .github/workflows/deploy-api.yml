name: Build and Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'apps/api/**'
      - 'packages/contracts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'server/deploy.sh'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include-workspace-root

      - name: Generate Prisma client
        run: npm run db:generate --workspace=apps/api

      - name: Test API
        run: npm test --workspace=apps/api

      - name: Build API
        run: npm run build --workspace=apps/api

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: ${{ vars.API_TARGET_PLATFORMS || 'linux/amd64' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pcu-graduationproject-v2-api:latest
            ghcr.io/${{ github.repository_owner }}/pcu-graduationproject-v2-api:sha-${{ github.sha }}
          # GHA cache layers: unchanged stages (apt-get, npm ci, sharp workaround) are
          # pulled from cache; only stages touched by the diff re-run. `mode=max` caches
          # intermediate stages too so deps + builder both benefit, not just the final
          # image. Branch-scoped per GHA cache rules; 10 GB soft limit is comfortable.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: server/deploy.sh
          target: ${{ secrets.DEPLOY_COMPOSE_PATH || '/srv/graduationproject_v2' }}
          strip_components: 1
          overwrite: true

      - name: SSH deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: GHCR_USERNAME,GHCR_TOKEN,DEPLOY_DIR,API_IMAGE
          script_stop: true
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin
            printf '%s' "${GHCR_TOKEN}" | podman login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            export DEPLOY_DIR="${DEPLOY_DIR:-/srv/graduationproject_v2}"
            chmod +x "${DEPLOY_DIR}/deploy.sh"

            if podman container exists gp-postgres; then
              umask 077
              backup_dir="${DEPLOY_DIR}/backups"
              backup_file="${backup_dir}/pre-webgl-${{ github.sha }}-$(date -u +%Y%m%dT%H%M%SZ).dump"
              mkdir -p "${backup_dir}"
              echo "Creating pre-deploy PostgreSQL backup at ${backup_file}"
              if ! podman exec gp-postgres sh -c 'exec pg_dump -Fc -U "$POSTGRES_USER" "$POSTGRES_DB"' > "${backup_file}"; then
                rm -f "${backup_file}"
                echo "Database backup failed; refusing to deploy."
                exit 1
              fi
              if [ ! -s "${backup_file}" ]; then
                rm -f "${backup_file}"
                echo "Database backup was empty; refusing to deploy."
                exit 1
              fi
            fi

            rollback_tag="localhost/pcu-graduationproject-v2-api:rollback"
            previous_image_id="$(podman inspect gp-api --format '{{.Image}}' 2>/dev/null || true)"
            if [ -n "${previous_image_id}" ]; then
              podman untag "${rollback_tag}" 2>/dev/null || true
              podman tag "${previous_image_id}" "${rollback_tag}"
            fi

            if ! API_IMAGE="${API_IMAGE}" PULL_API_IMAGE=true "${DEPLOY_DIR}/deploy.sh" up; then
              echo "Candidate deployment failed. Restoring the previous API image."
              if [ -z "${previous_image_id}" ]; then
                echo "No previous API image was available for rollback."
                exit 1
              fi
              API_IMAGE="${rollback_tag}" PULL_API_IMAGE=false "${DEPLOY_DIR}/deploy.sh" up
              echo "Rollback completed; failing the workflow to surface the rejected deployment."
              exit 1
            fi
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_COMPOSE_PATH }}
          API_IMAGE: ghcr.io/${{ github.repository_owner }}/pcu-graduationproject-v2-api:sha-${{ github.sha }}
