name: Build and Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'apps/api/**'
      - 'packages/contracts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'server/deploy.sh'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include-workspace-root

      - name: Generate Prisma client
        run: npm run db:generate --workspace=apps/api

      - name: Test API
        run: npm test --workspace=apps/api

      - name: Build API
        run: npm run build --workspace=apps/api

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: ${{ vars.API_TARGET_PLATFORMS || 'linux/amd64' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pcu-graduationproject-v2-api:latest
            ghcr.io/${{ github.repository_owner }}/pcu-graduationproject-v2-api:sha-${{ github.sha }}
          # GHA cache layers: unchanged stages (apt-get, npm ci, sharp workaround) are
          # pulled from cache; only stages touched by the diff re-run. `mode=max` caches
          # intermediate stages too so deps + builder both benefit, not just the final
          # image. Branch-scoped per GHA cache rules; 10 GB soft limit is comfortable.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: server/deploy.sh
          target: ${{ secrets.DEPLOY_COMPOSE_PATH || '/srv/graduationproject_v2' }}
          strip_components: 1
          overwrite: true

      - name: SSH deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: GHCR_USERNAME,GHCR_TOKEN,DEPLOY_DIR
          script_stop: true
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin
            printf '%s' "${GHCR_TOKEN}" | podman login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            export DEPLOY_DIR="${DEPLOY_DIR:-/srv/graduationproject_v2}"
            chmod +x "${DEPLOY_DIR}/deploy.sh"
            "${DEPLOY_DIR}/deploy.sh" up
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_COMPOSE_PATH }}
