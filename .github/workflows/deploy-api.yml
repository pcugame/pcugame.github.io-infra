name: Build and Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'apps/api/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          platforms: ${{ vars.API_TARGET_PLATFORMS || 'linux/amd64' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pcu-graduationproject-v2-api:latest
            ghcr.io/${{ github.repository_owner }}/pcu-graduationproject-v2-api:sha-${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: docker-compose.yml
          target: ${{ secrets.DEPLOY_COMPOSE_PATH || '/srv/graduationproject_v2' }}

      - name: SSH deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: GHCR_USERNAME,GHCR_TOKEN,COMPOSE_PATH
          script_stop: true
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin
            IMAGE="ghcr.io/${{ github.repository_owner }}/pcu-graduationproject-v2-api:latest"
            echo "Using image: $IMAGE"
            podman login ghcr.io -u "${GHCR_USERNAME}" -p "${GHCR_TOKEN}"
            podman pull "$IMAGE"
            cd "${COMPOSE_PATH:-/srv/graduationproject_v2}"
            podman compose pull api || true
            podman compose up -d
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          COMPOSE_PATH: ${{ secrets.DEPLOY_COMPOSE_PATH }}
