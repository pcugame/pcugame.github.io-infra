services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pcu_graduationproject_v2
      POSTGRES_USER: pcu_admin
      POSTGRES_PASSWORD: localdev
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcu_admin -d pcu_graduationproject_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v1.1.0
    restart: unless-stopped
    ports:
      - "3900:3900"   # S3 API
      - "3902:3902"   # Admin API
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3903/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  garage-init:
    image: dxflrs/garage:v1.1.0
    depends_on:
      garage:
        condition: service_healthy
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - ./garage-init.sh:/garage-init.sh:ro
    entrypoint: ["/bin/sh", "/garage-init.sh"]
    restart: "no"

volumes:
  pg_data:
    driver: local
  garage_data:
    driver: local
  garage_meta:
    driver: local
